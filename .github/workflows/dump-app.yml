name: Dump Flutter App

on:
  workflow_dispatch:
    inputs:
      input_path:
        description: "Path to APK, lib directory, libapp.so, or App file in this repository"
        required: true
        default: "App"
      flutter_path:
        description: "Optional Flutter/libflutter.so path. Leave empty/Flutter if you only have one App file."
        required: false
        default: "Flutter"
      dart_version:
        description: "Optional Dart target override. Example: 3.4.2_android_arm64 or 3.4.2_ios_arm64"
        required: false
        default: ""
      candidate_versions:
        description: "Optional comma-separated Dart versions to try first when only App is available. Example: 3.4.2,3.3.4,3.2.6"
        required: false
        default: ""
      out_dir:
        description: "Dump output directory"
        required: true
        default: "dump_out"
      no_analysis:
        description: "Build without code analysis for faster/more compatible dumps"
        required: true
        type: boolean
        default: false
      rebuild:
        description: "Force rebuild blutter executable"
        required: true
        type: boolean
        default: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  ARTIFACT_STAGE_DIR: ".dump_artifacts"

jobs:
  dump-app:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize artifact staging directory
        shell: bash
        run: |
          set -euo pipefail
          rm -rf "$ARTIFACT_STAGE_DIR"
          mkdir -p "$ARTIFACT_STAGE_DIR"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            python3-pyelftools \
            python3-requests \
            git \
            cmake \
            ninja-build \
            build-essential \
            pkg-config \
            libicu-dev \
            libcapstone-dev
          python -m pip install --upgrade pip
          python -m pip install requests pyelftools
          cmake --version
          ninja --version
          python --version
          g++ --version

      - name: Cache blutter build artifacts
        uses: actions/cache@v4
        with:
          path: |
            bin
            build
            dartsdk
            packages
            .dart_version_probe
          key: blutter-dump-${{ runner.os }}-${{ hashFiles('**/*.py', '**/CMakeLists.txt', '**/*.cmake') }}
          restore-keys: |
            blutter-dump-${{ runner.os }}-

      - name: Prepare input
        id: prepare
        shell: bash
        env:
          INPUT_PATH: ${{ inputs.input_path }}
          FLUTTER_PATH: ${{ inputs.flutter_path }}
          DART_VERSION: ${{ inputs.dart_version }}
          CANDIDATE_VERSIONS: ${{ inputs.candidate_versions }}
          OUT_DIR: ${{ inputs.out_dir }}
          NO_ANALYSIS: ${{ inputs.no_analysis }}
          REBUILD: ${{ inputs.rebuild }}
        run: |
          set -euo pipefail

          if [ -z "$OUT_DIR" ]; then
            OUT_DIR="dump_out"
          fi

          if [ ! -e "$INPUT_PATH" ]; then
            {
              echo "Input path does not exist: $INPUT_PATH"
              echo "Commit the App/APK/lib files to this repository, or update input_path when manually running this workflow."
            } | tee "$ARTIFACT_STAGE_DIR/error.txt" >&2
            exit 1
          fi

          rm -rf "$OUT_DIR" workflow_input
          mkdir -p "$OUT_DIR"

          extra_args=()
          if [ "$NO_ANALYSIS" = "true" ]; then
            extra_args+=("--no-analysis")
          fi
          if [ "$REBUILD" = "true" ]; then
            extra_args+=("--rebuild")
          fi

          if [ -n "$DART_VERSION" ]; then
            run_input="$INPUT_PATH"
            extra_args+=("--dart-version" "$DART_VERSION")
          elif [ -d "$INPUT_PATH" ] || [[ "$INPUT_PATH" == *.apk ]]; then
            run_input="$INPUT_PATH"
          else
            if [ -e "$FLUTTER_PATH" ]; then
              mkdir -p workflow_input
              cp "$INPUT_PATH" workflow_input/App
              cp "$FLUTTER_PATH" workflow_input/Flutter
              run_input="workflow_input"
            else
              echo "Only one App/libapp file was provided; auto-detecting target metadata..."
              resolve_log="$ARTIFACT_STAGE_DIR/resolve-single-app.log"
              resolve_env="$ARTIFACT_STAGE_DIR/resolve-single-app.env"
              set +e
              python scripts/resolve_single_app.py "$INPUT_PATH" --output "$resolve_env" --versions "$CANDIDATE_VERSIONS" 2>&1 | tee "$resolve_log"
              resolve_code=${PIPESTATUS[0]}
              set -e

              if [ -f "$resolve_env" ]; then
                # shellcheck disable=SC1090
                source "$resolve_env"
              fi

              if [ "$resolve_code" -ne 0 ]; then
                {
                  echo ""
                  echo "Could not inspect this single App file."
                  echo "Detected binary format: ${BINARY_FORMAT:-unknown}"
                  echo "Detected target: ${TARGET_OS:-unknown} ${TARGET_ARCH:-unknown}"
                  echo "Uploaded diagnostics: resolve-single-app.log and resolve-single-app.env"
                } | tee "$ARTIFACT_STAGE_DIR/error.txt" >&2
                exit 1
              fi

              run_input="$INPUT_PATH"
              if [ -n "${DART_VERSION:-}" ]; then
                extra_args+=("--dart-version" "$DART_VERSION")
                echo "Auto-selected Dart target: $DART_VERSION"
              else
                printf 'candidate_versions=%s\n' "${CANDIDATE_DART_VERSIONS:-}" >> "$GITHUB_OUTPUT"
                echo "No exact Dart target found; will try candidates: ${CANDIDATE_DART_VERSIONS:-<none>}"
              fi
              if [ "${COMPRESSED_POINTERS:-}" = "true" ]; then
                extra_args+=("--compressed-pointers")
                printf 'pointer_arg=%s\n' "--compressed-pointers" >> "$GITHUB_OUTPUT"
              elif [ "${COMPRESSED_POINTERS:-}" = "false" ]; then
                extra_args+=("--no-compressed-pointers")
                printf 'pointer_arg=%s\n' "--no-compressed-pointers" >> "$GITHUB_OUTPUT"
              fi
            fi
          fi

          printf 'run_input=%s\n' "$run_input" >> "$GITHUB_OUTPUT"
          printf 'out_dir=%s\n' "$OUT_DIR" >> "$GITHUB_OUTPUT"
          printf 'extra_args<<EOF\n' >> "$GITHUB_OUTPUT"
          printf '%q ' "${extra_args[@]}" >> "$GITHUB_OUTPUT"
          printf '\nEOF\n' >> "$GITHUB_OUTPUT"

          echo "Prepared input: $run_input"
          echo "Output dir: $OUT_DIR"
          echo "Extra args: ${extra_args[*]:-<none>}"

      - name: Dump App
        shell: bash
        run: |
          set -euo pipefail
          run_input="${{ steps.prepare.outputs.run_input }}"
          out_dir="${{ steps.prepare.outputs.out_dir }}"
          candidate_versions="${{ steps.prepare.outputs.candidate_versions }}"
          pointer_arg="${{ steps.prepare.outputs.pointer_arg }}"

          if [ -n "$candidate_versions" ]; then
            IFS=',' read -ra versions <<< "$candidate_versions"
            success=0
            : > blutter-dump.log
            for version in "${versions[@]}"; do
              version="$(echo "$version" | xargs)"
              [ -z "$version" ] && continue
              echo "Trying Dart target: $version" | tee -a blutter-dump.log
              rm -rf "$out_dir"
              mkdir -p "$out_dir"
              set +e
              try_args=(--dart-version "$version")
              if [ -n "$pointer_arg" ]; then
                try_args+=("$pointer_arg")
              fi
              if [ "${{ inputs.no_analysis }}" = "true" ]; then
                try_args+=("--no-analysis")
              fi
              if [ "${{ inputs.rebuild }}" = "true" ]; then
                try_args+=("--rebuild")
              fi
              python blutter.py "$run_input" "$out_dir" "${try_args[@]}" 2>&1 | tee -a blutter-dump.log
              code=${PIPESTATUS[0]}
              set -e
              if [ "$code" -eq 0 ]; then
                echo "$version" > "$ARTIFACT_STAGE_DIR/successful-dart-version.txt"
                success=1
                break
              fi
              echo "Dart target failed: $version" | tee -a blutter-dump.log
            done
            if [ "$success" -ne 1 ]; then
              echo "All candidate Dart targets failed." | tee "$ARTIFACT_STAGE_DIR/error.txt" >&2
              exit 1
            fi
          else
            python blutter.py "$run_input" "$out_dir" ${{ steps.prepare.outputs.extra_args }} 2>&1 | tee blutter-dump.log
          fi

      - name: Stage dump artifact files
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$ARTIFACT_STAGE_DIR"

          if [ -f blutter-dump.log ]; then
            cp blutter-dump.log "$ARTIFACT_STAGE_DIR/"
          fi

          out_dir="${{ steps.prepare.outputs.out_dir }}"
          if [ -n "$out_dir" ] && [ -d "$out_dir" ]; then
            mkdir -p "$ARTIFACT_STAGE_DIR/output"
            cp -a "$out_dir/." "$ARTIFACT_STAGE_DIR/output/"
          fi

          echo "Artifact staging tree:"
          find "$ARTIFACT_STAGE_DIR" -maxdepth 4 -type f | sort | sed 's#^#  #'

      - name: Upload dump artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: blutter-dump-${{ github.run_number }}
          path: .dump_artifacts/
          if-no-files-found: warn
          retention-days: 14
