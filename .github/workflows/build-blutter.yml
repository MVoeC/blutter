name: Build blutter

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout blutter
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install requests pyelftools

      - name: Init Windows deps
        run: |
          python scripts\init_env_win.py

      - name: Cache Dart SDK/build
        uses: actions/cache@v4
        with:
          path: |
            dartsdk
            build
          key: blutter-${{ runner.os }}-${{ hashFiles('**/*.py', '**/CMakeLists.txt') }}
          restore-keys: |
            blutter-${{ runner.os }}-

      - name: Build test
        shell: cmd
        run: |
          echo Blutter environment ready
          python blutter.py --help || exit /b 0
